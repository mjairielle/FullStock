<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — FullStock</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f7f9fb] min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-9 h-9 bg-slate-900 rounded-lg flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
        </svg>
      </div>
      <div>
        <p class="text-slate-900 font-bold text-xl leading-none tracking-tight">FullStock</p>
        <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-widest mt-0.5">Inventory Manager</p>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white border border-slate-200 rounded-xl p-8 shadow-sm">

      <div class="mb-6">
        <h2 class="text-[17px] font-semibold text-slate-900">Sign in to your account</h2>
        <p class="text-xs text-slate-400 mt-1">Enter your credentials to continue</p>
      </div>

      {% if error %}
      <div class="mb-5 flex items-start gap-2.5 bg-red-50 border border-red-200 rounded-md px-3.5 py-3">
        <svg class="w-4 h-4 text-red-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p class="text-sm text-red-700 font-medium">{{ error }}</p>
      </div>
      {% endif %}

      <form action="/login" method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Email Address</label>
          <input type="email" name="email" required autofocus
                 class="block w-full border border-slate-200 rounded-md py-2.5 px-3 text-sm text-slate-900 placeholder-slate-300
                        focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition-shadow"
                 placeholder="you@company.com">
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Password</label>
          <input type="password" name="password" required
                 class="block w-full border border-slate-200 rounded-md py-2.5 px-3 text-sm text-slate-900 placeholder-slate-300
                        focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition-shadow"
                 placeholder="••••••••">
        </div>

        <button type="submit"
                class="w-full bg-slate-900 hover:bg-slate-700 text-white font-semibold py-2.5 px-4 rounded-md text-sm transition-colors">
          Sign In →
        </button>
      </form>

      <!-- OAuth Divider -->
      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-slate-200"></div>
        <span class="text-xs text-slate-400 font-medium uppercase tracking-wider">or</span>
        <div class="flex-1 h-px bg-slate-200"></div>
      </div>

      <!-- Google Sign-In -->
      <a href="/login/google"
         class="flex items-center justify-center gap-2.5 w-full border border-slate-200 hover:border-slate-300 bg-white hover:bg-slate-50 text-slate-700 font-semibold py-2.5 px-4 rounded-md text-sm transition-colors">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </a>


      <div class="mt-6 text-center">
        <p class="text-sm text-slate-500">Don't have an account? <a href="/register" class="text-slate-900 font-semibold hover:underline">Register</a></p>
      </div>

    </div>

    <p class="text-center text-xs text-slate-400 mt-6">FullStock · Inventory Management System</p>

  </div>

</body>
</html>

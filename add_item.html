<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Item — FullStock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-[#f7f9fb] flex flex-row h-screen overflow-hidden">

  {% include '_nav.html' %}

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-auto min-w-0">

    <!-- Top Bar -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 shrink-0">
      <h1 class="text-[18px] font-semibold text-slate-900 leading-tight">Manage Inventory Items</h1>
      <p class="text-xs text-slate-400 mt-0.5">Add a new SKU or restock an existing product</p>
    </header>

    <main class="flex-1 p-6 overflow-auto">
      <div class="max-w-2xl mx-auto">

        <!-- Tab Strip -->
        <div class="bg-white border border-slate-200 rounded-lg overflow-hidden">

          <div class="flex border-b border-slate-200">
            <button onclick="switchTab('new')" id="tab-new"
                    class="flex-1 py-3.5 text-sm font-semibold text-center transition-colors border-b-2 border-slate-900 text-slate-900 bg-white">
              + New SKU
            </button>
            <button onclick="switchTab('restock')" id="tab-restock"
                    class="flex-1 py-3.5 text-sm font-semibold text-center transition-colors border-b-2 border-transparent text-slate-400 hover:text-slate-700 bg-white">
              Restock Existing
            </button>
          </div>

          <!-- NEW SKU PANEL -->
          <div id="panel-new" class="p-6">
            <div id="new-alert" class="hidden mb-5"></div>
            <div class="space-y-4">

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Product Name</label>
                  <input type="text" id="new_name" required
                         class="block w-full border border-slate-200 rounded-md py-2 px-3 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent"
                         placeholder="e.g. Titanium Drill Bit">
                </div>
                <div>
                  <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Category</label>
                  <input type="text" id="new_cat" required
                         class="block w-full border border-slate-200 rounded-md py-2 px-3 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent"
                         placeholder="e.g. Hardware">
                </div>
              </div>

              <div class="grid grid-cols-3 gap-4">
                <div>
                  <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Unit Cost ($)</label>
                  <input type="number" step="0.01" id="new_unit" required
                         class="block w-full border border-slate-200 rounded-md py-2 px-3 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent tabular-nums"
                         placeholder="0.00">
                </div>
                <div>
                  <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Order Cost ($)</label>
                  <input type="number" step="0.01" id="new_order" required
                         class="block w-full border border-slate-200 rounded-md py-2 px-3 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent tabular-nums"
                         placeholder="0.00">
                </div>
                <div>
                  <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Hold Cost/Yr ($)</label>
                  <input type="number" step="0.01" id="new_hold" required
                         class="block w-full border border-slate-200 rounded-md py-2 px-3 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent tabular-nums"
                         placeholder="0.00">
                </div>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Lead Time (days)</label>
                  <input type="number" id="new_lead" required
                         class="block w-full border border-slate-200 rounded-md py-2 px-3 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent tabular-nums"
                         placeholder="7">
                </div>
                <div>
                  <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Initial Stock Qty</label>
                  <input type="number" id="new_qty" required
                         class="block w-full border border-slate-200 rounded-md py-2 px-3 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent tabular-nums"
                         placeholder="0">
                </div>
              </div>

              <div class="pt-2">
                <button onclick="submitNewSku()"
                        class="w-full bg-slate-900 hover:bg-slate-700 text-white font-semibold py-2.5 px-4 rounded-md text-sm transition-colors">
                  Add New SKU
                </button>
              </div>

            </div>
          </div>

          <!-- RESTOCK PANEL -->
          <div id="panel-restock" class="p-6 hidden">
            <div id="restock-alert" class="hidden mb-5"></div>

            <!-- Barcode Scanner -->
            <div id="scanner-container-restock" class="hidden mb-4 border border-slate-200 rounded-lg overflow-hidden bg-slate-50 p-3">
              <div id="reader-restock" style="width:100%;"></div>
              <div class="text-center mt-2">
                <button type="button" id="closeScanBtnRestock"
                        class="text-red-500 hover:text-red-700 text-sm font-medium transition-colors">Close Scanner</button>
              </div>
            </div>

            <div class="space-y-4">

              <div>
                <div class="flex items-center justify-between mb-1.5">
                  <label class="block text-xs font-bold uppercase tracking-widest text-slate-400">Select SKU</label>
                  <button type="button" id="scanBtnRestock"
                          class="flex items-center gap-1.5 text-xs font-semibold text-slate-500 border border-slate-200 rounded-md px-2.5 py-1 hover:bg-slate-50 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path d="M3 9V5a2 2 0 0 1 2-2h4M3 15v4a2 2 0 0 0 2 2h4m10-16h4a2 2 0 0 1 2 2v4m0 10v4a2 2 0 0 1-2 2h-4"/>
                    </svg>
                    Scan Barcode
                  </button>
                </div>
                <select id="restock_sku" required
                        class="block w-full border border-slate-200 rounded-md py-2 px-3 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900 bg-white cursor-pointer">
                  <option value="">— Loading SKUs —</option>
                </select>
              </div>

              <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Current Stock</label>
                <input type="text" id="restock_current" disabled
                       class="block w-full bg-slate-50 border border-slate-200 rounded-md py-2 px-3 text-sm text-slate-500 font-bold tabular-nums cursor-not-allowed">
              </div>

              <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">Quantity to Add</label>
                <input type="number" id="restock_qty" required min="1"
                       class="block w-full border border-slate-200 rounded-md py-2 px-3 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent tabular-nums"
                       placeholder="0">
              </div>

              <div class="pt-2">
                <button onclick="submitRestock()"
                        class="w-full bg-slate-900 hover:bg-slate-700 text-white font-semibold py-2.5 px-4 rounded-md text-sm transition-colors">
                  Restock SKU
                </button>
              </div>

            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script>
    let allStocks = [];
    let html5QrcodeScannerRestock = null;

    // ── Alert helpers ─────────────────────────────────────────────
    function showAlert(id, msg, type = 'success') {
      const el = document.getElementById(id);
      const isOk = type === 'success';
      el.className = `mb-5 flex items-start gap-2.5 ${isOk ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-red-50 border-red-200 text-red-700'} border rounded-md px-3.5 py-3`;
      el.innerHTML = `<svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        ${isOk ? '<polyline points="20 6 9 17 4 12"/>' : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'}
      </svg><p class="text-sm font-medium">${msg}</p>`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    // ── Tabs ──────────────────────────────────────────────────────
    function switchTab(tab) {
      const isNew = tab === 'new';
      document.getElementById('panel-new').classList.toggle('hidden', !isNew);
      document.getElementById('panel-restock').classList.toggle('hidden', isNew);

      const tabNew     = document.getElementById('tab-new');
      const tabRestock = document.getElementById('tab-restock');
      tabNew.className     = `flex-1 py-3.5 text-sm font-semibold text-center transition-colors border-b-2 ${isNew  ? 'border-slate-900 text-slate-900 bg-white' : 'border-transparent text-slate-400 hover:text-slate-700 bg-white'}`;
      tabRestock.className = `flex-1 py-3.5 text-sm font-semibold text-center transition-colors border-b-2 ${!isNew ? 'border-slate-900 text-slate-900 bg-white' : 'border-transparent text-slate-400 hover:text-slate-700 bg-white'}`;

      if (!isNew && allStocks.length === 0) fetchStocks();
    }

    // ── Fetch SKUs ────────────────────────────────────────────────
    async function fetchStocks() {
      try {
        const res  = await fetch('/api/stocks');
        allStocks  = await res.json();
        const sel  = document.getElementById('restock_sku');
        sel.innerHTML = '<option value="">— Select SKU —</option>';
        allStocks.forEach(s => {
          const opt = document.createElement('option');
          opt.value         = s.sku_id;
          opt.textContent   = `${s.product_name} (${s.sku_id})`;
          opt.dataset.qty   = s.qty_on_hand;
          sel.appendChild(opt);
        });
      } catch (e) { console.error('Failed to fetch stocks', e); }
    }

    document.getElementById('restock_sku').addEventListener('change', e => {
      const opt = e.target.selectedOptions[0];
      document.getElementById('restock_current').value = opt && opt.value ? opt.dataset.qty : '';
    });

    // ── Submit New SKU ────────────────────────────────────────────
    async function submitNewSku() {
      const fields = ['new_name', 'new_cat', 'new_unit', 'new_order', 'new_hold', 'new_lead', 'new_qty'];
      if (fields.some(id => !document.getElementById(id).value)) {
        showAlert('new-alert', 'All fields are required.', 'error'); return;
      }
      const payload = {
        product_name:     document.getElementById('new_name').value,
        category:         document.getElementById('new_cat').value,
        unit_cost:        parseFloat(document.getElementById('new_unit').value),
        order_cost:       parseFloat(document.getElementById('new_order').value),
        hold_cost_annual: parseFloat(document.getElementById('new_hold').value),
        lead_time_days:   parseInt(document.getElementById('new_lead').value, 10),
        qty_on_hand:      parseInt(document.getElementById('new_qty').value, 10)
      };
      try {
        const res  = await fetch('/api/sku/new', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.status === 'ok') {
          showAlert('new-alert', `SKU created successfully! ID: ${data.sku_id}`);
          fields.forEach(id => document.getElementById(id).value = '');
          allStocks = [];
        } else { showAlert('new-alert', 'Error: ' + data.error, 'error'); }
      } catch { showAlert('new-alert', 'Request failed.', 'error'); }
    }

    // ── Submit Restock ────────────────────────────────────────────
    async function submitRestock() {
      const sku_id   = document.getElementById('restock_sku').value;
      const qty_str  = document.getElementById('restock_qty').value;
      if (!sku_id)  { showAlert('restock-alert', 'Select a SKU.', 'error'); return; }
      if (!qty_str) { showAlert('restock-alert', 'Enter a quantity.', 'error'); return; }
      const payload = { sku_id, qty_to_add: parseInt(qty_str, 10) };
      try {
        const res  = await fetch('/api/sku/restock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.status === 'ok') {
          showAlert('restock-alert', `Restocked! New qty: ${data.new_qty}`);
          document.getElementById('restock_qty').value    = '';
          document.getElementById('restock_current').value = '';
          document.getElementById('restock_sku').value    = '';
          fetchStocks();
        } else { showAlert('restock-alert', 'Error: ' + data.error, 'error'); }
      } catch { showAlert('restock-alert', 'Request failed.', 'error'); }
    }

    // ── Barcode Scanner ───────────────────────────────────────────
    document.getElementById('scanBtnRestock').addEventListener('click', () => {
      document.getElementById('scanner-container-restock').classList.remove('hidden');
      if (!html5QrcodeScannerRestock) {
        html5QrcodeScannerRestock = new Html5QrcodeScanner(
          'reader-restock',
          { fps: 10, qrbox: { width: 250, height: 250 } },
          false
        );
        html5QrcodeScannerRestock.render(decodedText => {
          const sel = document.getElementById('restock_sku');
          for (let i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === decodedText) {
              sel.selectedIndex = i;
              sel.dispatchEvent(new Event('change'));
              break;
            }
          }
          document.getElementById('closeScanBtnRestock').click();
        }, () => {});
      }
    });

    document.getElementById('closeScanBtnRestock').addEventListener('click', () => {
      document.getElementById('scanner-container-restock').classList.add('hidden');
      if (html5QrcodeScannerRestock) {
        html5QrcodeScannerRestock.clear();
        html5QrcodeScannerRestock = null;
      }
    });
  </script>

</body>
</html>

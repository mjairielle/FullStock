version: "3.8"

services:
  # ── MySQL Database ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: fullstock-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fullstock_secure_pw}
      MYSQL_DATABASE: fullstock
    ports:
      - "3307:3306"   # Host 3307 to avoid conflict with local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FullStock Application ──────────────────────────────────────
  app:
    build: .
    container_name: fullstock-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:

<script>
  if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
<meta name="csrf-token" content="{{ csrf_token() }}">
<style>

    filter: invert(1) hue-rotate(180deg);
    background-color: #f7f9fb;
  }
  html.dark img, html.dark video {

</style>

        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>

      <svg class="w-4 h-4 shrink-0 stroke-slate-400 group-hover:stroke-slate-700 transition-colors" fill="none" viewBox="0 0 24 24" stroke-width="2">

      </form>
    </div>

  </div>
  {% endif %}

</aside>

<script>
// ── CSRF fetch wrapper ──────────────────────────────────────────
// Automatically attaches the CSRF token to all non-GET fetch requests
(function() {
  const csrfMeta = document.querySelector('meta[name="csrf-token"]');
  const CSRF_TOKEN = csrfMeta ? csrfMeta.content : '';
  const _origFetch = window.fetch;
  window.fetch = function(url, opts) {
    opts = opts || {};
    if (opts.method && opts.method.toUpperCase() !== 'GET') {
      opts.headers = Object.assign({}, opts.headers || {}, { 'X-CSRFToken': CSRF_TOKEN });
    }
    return _origFetch.call(this, url, opts);
  };
})();

// ── Sanitize helper for XSS prevention ──────────────────────────
function sanitize(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

// ── Nav active highlight ────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const path = window.location.pathname;
  const navMap = {
    '/dashboard': 'nav-dashboard',
    '/': 'nav-dashboard',
    '/stocks': 'nav-stocks',
    '/analytics': 'nav-analytics',
    '/audit': 'nav-audit',
    '/add-item': 'nav-add-item'
  };
  const activeId = navMap[path];
  if (!activeId) return;
  const el = document.getElementById(activeId);
  if (!el) return;
  if (activeId === 'nav-add-item') return; // already styled
  el.classList.add('nav-active');
  el.classList.remove('text-slate-600', 'hover:bg-slate-50', 'hover:text-slate-900');
  const icon = el.querySelector('svg');
  if (icon) { icon.classList.remove('stroke-slate-400'); icon.classList.add('stroke-white'); }
});

// ── Theme Toggle ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const themeBtn = document.getElementById('themeToggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
  }
});
</script>
